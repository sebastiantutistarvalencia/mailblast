<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 ¡Sorpresa!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0f;
  font-family:'Segoe UI',system-ui,sans-serif;
  color:#e0e0e0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

canvas#confetti{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.card{
  position:relative;
  z-index:10;
  background:rgba(19,19,31,.95);
  border:1px solid rgba(124,58,237,.4);
  border-radius:24px;
  padding:48px 52px;
  max-width:520px;
  width:90%;
  text-align:center;
  box-shadow:0 0 60px rgba(124,58,237,.25), 0 20px 60px rgba(0,0,0,.5);
  animation:popIn .6s cubic-bezier(.175,.885,.32,1.275) both;
}
@keyframes popIn{
  from{opacity:0;transform:scale(.7) translateY(30px)}
  to  {opacity:1;transform:scale(1) translateY(0)}
}

.emoji-big{
  font-size:72px;
  line-height:1;
  margin-bottom:24px;
  display:block;
  animation:bounce 1.5s ease-in-out infinite;
}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

h1{
  font-size:32px;
  font-weight:800;
  background:linear-gradient(135deg,#7c3aed,#a855f7,#ec4899);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:12px;
  animation:slideUp .5s .2s both;
}
p{
  color:#aaa;
  font-size:16px;
  line-height:1.7;
  margin-bottom:28px;
  animation:slideUp .5s .35s both;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.btn-group{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  animation:slideUp .5s .5s both;
}
.btn{
  padding:12px 28px;
  border-radius:50px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  border:none;
  transition:all .2s;
  text-decoration:none;
  display:inline-block;
}
.btn-primary{
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  color:#fff;
  box-shadow:0 4px 20px rgba(124,58,237,.4);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,58,237,.5)}
.btn-outline{
  background:transparent;
  border:2px solid rgba(124,58,237,.5);
  color:#a855f7;
}
.btn-outline:hover{background:rgba(124,58,237,.15)}

.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,.4),transparent);margin:28px 0}

/* Interactivo: mini juego */
.game-section{animation:slideUp .5s .6s both}
.game-section h3{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.slots{
  display:flex;
  gap:12px;
  justify-content:center;
  margin-bottom:16px;
}
.slot{
  width:70px;height:70px;
  background:#0d0d18;
  border:2px solid #2a2a3f;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  transition:all .3s;
  cursor:default;
  user-select:none;
}
.slot.spin{animation:spin .15s linear infinite}
@keyframes spin{to{transform:rotateY(360deg)}}
.slot.winner{border-color:#22c55e;box-shadow:0 0 20px rgba(34,197,94,.4)}

#spin-btn{
  background:linear-gradient(135deg,#ec4899,#f97316);
  color:#fff;
  padding:10px 32px;
  border-radius:50px;
  border:none;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:all .2s;
  box-shadow:0 4px 20px rgba(236,72,153,.3);
}
#spin-btn:hover{transform:translateY(-2px)}
#spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
#spin-result{min-height:24px;margin-top:12px;font-weight:700;font-size:15px}

/* Contador */
.counter-row{
  display:flex;gap:12px;justify-content:center;margin-bottom:20px;
}
.counter-box{
  background:#0d0d18;border:1px solid #2a2a3f;border-radius:10px;
  padding:12px 16px;min-width:64px;text-align:center;
}
.counter-num{font-size:28px;font-weight:800;color:#a855f7;line-height:1}
.counter-lbl{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Particles BG */
.particle{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  opacity:.12;
  animation:float linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh) rotate(0)}
  to{transform:translateY(-10vh) rotate(360deg)}
}

/* Click ripple */
.ripple{
  position:fixed;
  border-radius:50%;
  background:rgba(168,85,247,.3);
  pointer-events:none;
  transform:scale(0);
  animation:rippleAnim .6s ease-out forwards;
  z-index:5;
}
@keyframes rippleAnim{
  to{transform:scale(4);opacity:0}
}
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="card">
  <span class="emoji-big" id="main-emoji">🎉</span>
  <h1>¡Lo hiciste!</h1>
  <p id="main-msg">Hiciste clic en la imagen y llegaste aquí.<br>Eso merece una celebración.</p>

  <div class="btn-group">
    <button class="btn btn-primary" onclick="moreConfetti()">🎊 Más confeti</button>
    <button class="btn btn-outline" onclick="changeEmoji()">🎲 Cambiar emoji</button>
  </div>

  <div class="divider"></div>

  <!-- Mini juego de tragamonedas -->
  <div class="game-section">
    <h3>🎰 Mini juego — Intenta tu suerte</h3>
    <div class="slots">
      <div class="slot" id="s1">🍀</div>
      <div class="slot" id="s2">⭐</div>
      <div class="slot" id="s3">🎯</div>
    </div>
    <button id="spin-btn" onclick="spin()">¡Girar!</button>
    <div id="spin-result"></div>
  </div>

  <div class="divider"></div>

  <!-- Contador de clics en la página -->
  <div>
    <div style="font-size:12px;color:#666;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">Interacciones en esta página</div>
    <div class="counter-row">
      <div class="counter-box">
        <div class="counter-num" id="cnt-clicks">0</div>
        <div class="counter-lbl">Clics</div>
      </div>
      <div class="counter-box">
        <div class="counter-num" id="cnt-confetti">0</div>
        <div class="counter-lbl">Confetis</div>
      </div>
      <div class="counter-box">
        <div class="counter-num" id="cnt-spins">0</div>
        <div class="counter-lbl">Giros</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── COUNTERS ──────────────────────────────────────────────────────────────
let counters = { clicks: 0, confetti: 0, spins: 0 };
function inc(key) {
  counters[key]++;
  document.getElementById('cnt-' + key).textContent = counters[key];
}

document.addEventListener('click', (e) => {
  inc('clicks');
  createRipple(e.clientX, e.clientY);
});

function createRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'ripple';
  const size = 60;
  r.style.cssText = `width:${size}px;height:${size}px;left:${x - size/2}px;top:${y - size/2}px`;
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 700);
}

// ─── CONFETTI ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

function randBetween(a, b) { return a + Math.random() * (b - a); }
const COLORS = ['#7c3aed','#a855f7','#ec4899','#f97316','#eab308','#22c55e','#38bdf8'];

function burst(n = 120, x, y) {
  const cx = x ?? innerWidth  / 2;
  const cy = y ?? innerHeight / 2;
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = randBetween(3, 14);
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - randBetween(2, 8),
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      size: randBetween(4, 10),
      life: 1,
      decay: randBetween(.012, .022),
      rot: Math.random() * 360,
      rotV: randBetween(-6, 6),
      shape: Math.random() > .5 ? 'rect' : 'circle',
    });
  }
  inc('confetti');
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    if (p.shape === 'rect') {
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size/2);
    } else {
      ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.3;
    p.vx *= 0.99;
    p.rot += p.rotV;
    p.life -= p.decay;
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

// Initial burst
setTimeout(() => {
  burst(160);
  setTimeout(() => burst(80, innerWidth * .25, 0), 400);
  setTimeout(() => burst(80, innerWidth * .75, 0), 700);
}, 300);

function moreConfetti() {
  burst(200, randBetween(100, innerWidth - 100), randBetween(50, 200));
  burst(100, randBetween(100, innerWidth - 100), 0);
}

// ─── EMOJI CAROUSEL ────────────────────────────────────────────────────────
const emojis = ['🎉','🎊','🚀','🌟','💎','🔥','⚡','🦄','🎯','💜','🎁','🥳'];
let emojiIdx = 0;
function changeEmoji() {
  emojiIdx = (emojiIdx + 1) % emojis.length;
  const el = document.getElementById('main-emoji');
  el.style.transform = 'scale(1.5) rotate(15deg)';
  el.textContent = emojis[emojiIdx];
  setTimeout(() => el.style.transform = '', 300);
}

// ─── SLOT MACHINE ──────────────────────────────────────────────────────────
const SYMBOLS = ['🍀','⭐','🎯','💎','🔥','🌈','🎁','🦄','🍕','🎰'];
let spinning = false;

function spin() {
  if (spinning) return;
  spinning = true;
  inc('spins');
  const btn = document.getElementById('spin-btn');
  btn.disabled = true;
  document.getElementById('spin-result').textContent = '';

  const slots = ['s1','s2','s3'].map(id => document.getElementById(id));
  slots.forEach(s => s.classList.add('spin'));

  let ticks = 0;
  const tick = setInterval(() => {
    slots.forEach(s => s.textContent = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]);
    ticks++;
    if (ticks > 15) {
      clearInterval(tick);
      const results = slots.map(() => SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]);
      slots.forEach((s, i) => {
        s.classList.remove('spin');
        s.textContent = results[i];
      });

      const allSame = results.every(r => r === results[0]);
      const twosame = results[0]===results[1] || results[1]===results[2] || results[0]===results[2];

      const resEl = document.getElementById('spin-result');
      if (allSame) {
        slots.forEach(s => s.classList.add('winner'));
        resEl.style.color = '#22c55e';
        resEl.textContent = '🎉 ¡JACKPOT! ¡Ganaste!';
        burst(300);
      } else if (twosame) {
        resEl.style.color = '#eab308';
        resEl.textContent = '✨ ¡Casi! Dos iguales';
      } else {
        resEl.style.color = '#888';
        resEl.textContent = 'Sin suerte esta vez 😅 ¡Intenta de nuevo!';
      }
      setTimeout(() => { slots.forEach(s => s.classList.remove('winner')); }, 2000);
      spinning = false;
      btn.disabled = false;
    }
  }, 80);
}

// ─── BG PARTICLES ──────────────────────────────────────────────────────────
for (let i = 0; i < 12; i++) {
  const el = document.createElement('div');
  el.className = 'particle';
  const size = Math.random() * 40 + 10;
  el.style.cssText = `
    width:${size}px;height:${size}px;
    left:${Math.random()*100}vw;
    background:hsl(${260 + Math.random()*60},70%,60%);
    animation-duration:${8 + Math.random()*12}s;
    animation-delay:-${Math.random()*10}s;
  `;
  document.body.appendChild(el);
}
</script>
</body>
</html>
